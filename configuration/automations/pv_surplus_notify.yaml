# Notifica in-HA quando c'e' una finestra stabile di surplus, per carichi manuali
# (lavatrice, lavastoviglie, asciugatrice, forno).
#
# Usa persistent_notification (sempre disponibile, mostra nel bell icon HA).
# Quando l'utente installa la HA Companion App sul telefono, sostituire
# persistent_notification.create con notify.mobile_app_<device-name>.

automation:
  - id: pv_surplus_notify_window_open
    alias: "PV surplus - finestra carichi manuali (apre)"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.pv_surplus_avg_15min
        above: input_number.surplus_threshold_notify
        for:
          minutes: 15
    condition:
      - condition: state
        entity_id: input_boolean.optimizer_enabled
        state: "on"
    action:
      - service: persistent_notification.create
        data:
          notification_id: pv_surplus_window
          title: "Finestra surplus FV"
          message: >
            Surplus {{ states('sensor.pv_surplus_avg_15min') | int }} W stabile da 15 min.
            Buon momento per lavatrice/lavastoviglie/asciugatrice.
            [Apri Energy dashboard](/lovelace/energy)

  - id: pv_surplus_notify_window_close
    alias: "PV surplus - finestra carichi manuali (chiude)"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.pv_surplus_avg_15min
        below: 300
        for:
          minutes: 10
    action:
      - service: persistent_notification.dismiss
        data:
          notification_id: pv_surplus_window
