# ACS solar-following scheduler (v3 - SOLO Off e Eco+).
#
# IMPORTANTE: stesso consumo totale, solo timing diverso.
# Non si forza mai un target piu' alto (NIENTE modo Comfort).
# La logica e' "blocca/sblocca Eco+", lasciando alla PdC il suo target naturale.
#
# State machine giornaliera:
#   22:00         Off          Sopprime riscaldamento notturno.
#   10:00         Eco+         Sblocca riscaldamento se forecast solare OK.
#                              La PdC vede ACS sotto la sua soglia interna (~42 C
#                              dopo 12h di perdite) e parte automaticamente,
#                              scaldando al SUO target naturale (~46 C) durante
#                              le ore di sole.
#   15:00         Eco+         Fallback per giornate nuvolose (no-op se gia' Eco+).
#   22:00         Off          Prossimo ciclo notte.
#
# Safety: se temp ACS scende sotto 38 C in qualunque momento -> forza Eco+.

automation:
  # 1. Soppressione notturna
  # Niente da fare se la PdC e' gia' in Off (es. fermata da target_reached).
  - id: acs_night_suppression
    alias: "ACS: sopprimi riscaldamento notturno"
    mode: single
    trigger:
      - platform: time
        at: "22:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.optimizer_enabled
        state: "on"
      - condition: not
        conditions:
          - condition: state
            entity_id: water_heater.boschcom_k30_101794077_waterheater
            state: "Off"
    action:
      - service: water_heater.set_operation_mode
        target:
          entity_id: water_heater.boschcom_k30_101794077_waterheater
        data:
          operation_mode: "Off"
      - service: logbook.log
        data:
          name: "ACS Scheduler"
          message: >
            Notte: modo Off. ACS attuale {{ states('sensor.boschcom_k30_101794077_dhw1_sensor') }} C.

  # 2. Sblocca Eco+ all'inizio della finestra solare
  # Quando ri-abilitiamo Eco+, la PdC vede il tank sotto la sua soglia interna
  # e parte spontaneamente. Heater al SUO target Eco+ (~46 C), non a target piu' alti.
  - id: acs_solar_window_open
    alias: "ACS: sblocca Eco+ in finestra solare"
    mode: single
    trigger:
      - platform: time
        at: "10:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.optimizer_enabled
        state: "on"
      # Forecast residuo sufficiente per giustificare riattivazione mattutina.
      - condition: numeric_state
        entity_id: sensor.energy_production_today_remaining
        above: input_number.acs_min_forecast_kwh
      # Skip se gia' Eco+ (es. utente ha cambiato manualmente).
      - condition: not
        conditions:
          - condition: state
            entity_id: water_heater.boschcom_k30_101794077_waterheater
            state: "Eco+"
    action:
      - service: water_heater.set_operation_mode
        target:
          entity_id: water_heater.boschcom_k30_101794077_waterheater
        data:
          operation_mode: "Eco+"
      - service: logbook.log
        data:
          name: "ACS Scheduler"
          message: >
            Finestra solare aperta. Forecast residuo:
            {{ states('sensor.energy_production_today_remaining') }} kWh.
            ACS: {{ states('sensor.boschcom_k30_101794077_dhw1_sensor') }} C
            -> Eco+ (la PdC decide se scaldare in base al SUO threshold).

  # 3. Fallback serale per giornate nuvolose
  # Se forecast era basso al mattino, la PdC e' rimasta Off tutto il giorno.
  # Le 15:00 e' l'ultima finestra utile prima della soppressione notturna delle 22.
  - id: acs_evening_fallback
    alias: "ACS: fallback Eco+ pomeridiano"
    mode: single
    trigger:
      - platform: time
        at: "15:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.optimizer_enabled
        state: "on"
      - condition: not
        conditions:
          - condition: state
            entity_id: water_heater.boschcom_k30_101794077_waterheater
            state: "Eco+"
    action:
      - service: water_heater.set_operation_mode
        target:
          entity_id: water_heater.boschcom_k30_101794077_waterheater
        data:
          operation_mode: "Eco+"
      - service: logbook.log
        data:
          name: "ACS Scheduler"
          message: >
            Fallback pomeridiano: Eco+. ACS: {{ states('sensor.boschcom_k30_101794077_dhw1_sensor') }} C.

  # 4. Safety fallback - mai docce fredde
  # Se ACS sotto soglia di sicurezza, forza Eco+ indipendentemente dall'ora.
  - id: acs_safety_fallback
    alias: "ACS: safety fallback su temperatura critica"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.boschcom_k30_101794077_dhw1_sensor
        below: input_number.acs_safety_min_temp
        for:
          minutes: 5
    condition:
      - condition: state
        entity_id: input_boolean.optimizer_enabled
        state: "on"
      - condition: not
        conditions:
          - condition: state
            entity_id: water_heater.boschcom_k30_101794077_waterheater
            state: "Eco+"
    action:
      - service: water_heater.set_operation_mode
        target:
          entity_id: water_heater.boschcom_k30_101794077_waterheater
        data:
          operation_mode: "Eco+"
      - service: persistent_notification.create
        data:
          title: "ACS safety override"
          message: >
            ACS sceso sotto soglia di sicurezza
            ({{ states('sensor.boschcom_k30_101794077_dhw1_sensor') }} C).
            Forzato Eco+ per evitare docce fredde.
      - service: logbook.log
        data:
          name: "ACS Scheduler"
          message: >
            Safety override: temp ACS critica
            ({{ states('sensor.boschcom_k30_101794077_dhw1_sensor') }} C)
            -> Eco+.
