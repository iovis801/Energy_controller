input_number:
  # Soglia sotto cui la PdC NON e' mai lasciata - safety contro docce fredde
  acs_safety_min_temp:
    name: "ACS safety minimum (C)"
    min: 30
    max: 45
    step: 1
    initial: 38
    unit_of_measurement: "°C"
    icon: mdi:shield-alert

  # Temperatura target naturale di Eco+ - quando l'ACS arriva qui in modo Comfort
  # la PdC viene messa in Off per non sovrariscaldare
  acs_target_temp_natural:
    name: "ACS target naturale Eco+ (C)"
    min: 42
    max: 55
    step: 1
    initial: 47
    unit_of_measurement: "°C"
    icon: mdi:water-boiler

  # Soglia di forecast residuo per giudicare se vale la pena tentare il riscaldamento
  # solare. Sotto questa soglia la giornata e' considerata nuvolosa e si rimanda al
  # top-up serale (Eco+).
  acs_min_forecast_kwh:
    name: "Forecast residuo minimo per ACS solar (kWh)"
    min: 1
    max: 20
    step: 0.5
    initial: 5
    unit_of_measurement: "kWh"
    icon: mdi:weather-sunny

  # Soglia per notifica push "buon momento per lavatrice"
  surplus_threshold_notify:
    name: "Soglia surplus per notifica carichi manuali (W)"
    min: 200
    max: 3000
    step: 100
    initial: 1000
    unit_of_measurement: W
    icon: mdi:bell-outline

input_boolean:
  optimizer_enabled:
    name: "Ottimizzatore ACS attivo"
    icon: mdi:auto-fix
